<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Download Simulation</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .container {
      width: 350px;
      padding: 20px;
      background: #1e293b;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h2 {
      margin-bottom: 20px;
    }

    .progress-bar {
      width: 100%;
      height: 20px;
      background: #334155;
      border-radius: 50px;
      overflow: hidden;
      margin-bottom: 15px;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #22c55e, #16a34a);
      animation: load 5s linear forwards;
    }

    @keyframes load {
      0% { width: 0%; }
      100% { width: 100%; }
    }

    .text {
      font-size: 14px;
      color: #cbd5e1;
    }

    .btn {
      margin-top: 15px;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    .btn:hover {
      background: #2563eb;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Downloading File...</h2>

    <div class="progress-bar">
      <div class="progress"></div>
    </div>

    <div class="text">Please wait while your file is downloading...</div>

    <button class="btn" onclick="location.reload()">Restart</button>
  </div>

</body>
</html>
